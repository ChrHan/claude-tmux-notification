# >>> claude-tmux indicator >>>
# Per-window ✳N Claude Code agent indicator. Managed by install.sh.
# __CLAUDE_TMUX_DIR__ is substituted with the module's absolute path at install time.
set -g status-interval 5
set -ag status-right "#(bash __CLAUDE_TMUX_DIR__/claude-tmux-count.sh)"

# Window-text format below requires the catppuccin/tmux theme (reads @claude_count /
# @claude_busy: orange while busy, green when idle, nothing when no agents).
# NON-CATPPUCCIN SETUPS: delete the two @catppuccin_* lines and instead fold the indicator
# into your own window-status-format / status-right, e.g.:
#   set -ag status-right "#{?@claude_busy,#[fg=colour215] ✳#{@claude_count}#[default],#{?@claude_count,#[fg=colour150] ✳#{@claude_count}#[default],}}"
set -g @catppuccin_window_text " #W#{?@claude_busy,#[fg=#fab387] ✳#{@claude_count}#[fg=default],#{?@claude_count,#[fg=#a6e3a1] ✳#{@claude_count}#[fg=default],}}"
set -g @catppuccin_window_current_text " #W#{?@claude_busy,#[fg=#fab387] ✳#{@claude_count}#[fg=default],#{?@claude_count,#[fg=#a6e3a1] ✳#{@claude_count}#[fg=default],}}"
# <<< claude-tmux indicator <<<
