# Self-contained tmux config for recording the indicator demo. No theme dependency:
# the ✳ indicator is folded directly into window-status-format here, the same way the
# README shows non-catppuccin users do it. Reads $CLAUDE_TMUX_DIR (set by launch.sh) to
# locate the poller. Loaded on a dedicated socket so it never touches your real tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#181825 fg=#cdd6f4"
set -g status-left "#[fg=#181825,bg=#89b4fa,bold] DEMO #[bg=#181825] "
set -g status-left-length 20

# status-right runs the real poller every status-interval (it prints nothing; it just
# sets @claude_count / @claude_busy per window). This IS the polling half of the indicator.
set -g status-right "#(bash \"$CLAUDE_TMUX_DIR/claude-tmux-count.sh\")#[fg=#6c7086]claude-tmux indicator "
set -g status-right-length 60

set -g window-status-separator ""
# inactive tab: ✳N — orange when busy, green when idle, nothing when no agent
set -g window-status-format "  #W#{?@claude_busy,#[fg=#fab387] ✳#{@claude_count}#[fg=default],#{?@claude_count,#[fg=#a6e3a1] ✳#{@claude_count}#[fg=default],}}  "
# active tab: highlighted, same indicator logic with darker-on-light contrast
set -g window-status-current-format "#[fg=#181825,bg=#b4befe,bold]  #W#{?@claude_busy,#[fg=#d20f39] ✳#{@claude_count},#{?@claude_count,#[fg=#40a02b] ✳#{@claude_count},}}  #[default]"
